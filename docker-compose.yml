services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - API_URL=http://api:8000
      - ENABLE_REPLAY=true
      - REPLAY_SPEED=10
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  dashboard:
    build: .
    command: python dashboard/serve.py
    ports:
      - "3000:3000"
    environment:
      - DASHBOARD_PORT=3000
    depends_on:
      api:
        condition: service_healthy

  pipeline:
    build: .
    profiles: ["pipeline"]
    volumes:
      - ./data:/app/data
    environment:
      - API_URL=http://api:8000
    command: bash pipeline/run.sh
    depends_on:
      api:
        condition: service_healthy
